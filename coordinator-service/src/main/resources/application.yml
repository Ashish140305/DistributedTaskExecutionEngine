server:
  port: 8080

spring:
  application:
    name: coordinator-service
  datasource:
    url: jdbc:postgresql://localhost:5432/taskengine
    username: taskengine
    password: taskengine
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

grpc:
  server:
    port: 9090

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: coordinator-service

logging:
  level:
    com.taskengine.coordinator: INFO
    org.hibernate.SQL: WARN
