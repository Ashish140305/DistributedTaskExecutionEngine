# Prometheus Configuration for Distributed Task Engine
# Scrapes metrics from coordinator and worker actuator endpoints

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Coordinator Service metrics
  - job_name: 'coordinator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['coordinator:8080']
        labels:
          service: 'coordinator'
          environment: 'docker'

  # Worker Service metrics (multiple instances)
  - job_name: 'workers'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'worker-1:8081'
          - 'worker-2:8082'
          - 'worker-3:8083'
        labels:
          service: 'worker'
          environment: 'docker'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
